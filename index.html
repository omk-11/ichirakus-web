<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Ichiraku Ramen</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Logo -->
    <div class="logo">
        <img src="/utils/logo.avif" alt="">
    </div>


    <!-- Title -->
    <div class="title">
        <h1>TODAY'S<br>SPECIAL</h1>
        <p>its tasty dattebayo...</p>
    </div>


    <!-- Earth ramen card -->
    <div class="card earth">
        <h3>Earth ramen</h3>
        <p>Inspired by Thai flavors, rich herby and coconuty taste.</p>
    </div>


    <!-- Shoyu ramen card -->
    <div class="card shoyu">
        <h3>Shoyu ramen</h3>
        <p>Traditional shoyu ramen using darker Japanese soy sauce.</p>
    </div>


    <!-- Ramen Images (EMPTY TAGS as requested) -->
    <div class="ramen ramen1">

        <div class="patch patch1"></div>
        <img src="/utils/ramen2.png" alt="">

    </div>

    <div class="ramen ramen2">

        <div class="patch patch2"></div>
        <img src="/utils/ramen1.png" alt="">

    </div>


    <!-- Price tags
    <div class="price price1">300</div>
    <div class="price price2">375</div> -->


</div>

<div class="new"></div>
